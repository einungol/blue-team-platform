<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue Team Lab Platform</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #00d4aa; --secondary: #1a1a2e; --bg: #0a0a12; --card-bg: #16162a; --text: #e0e0e0; --text-muted: #888; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Auth */
    .auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .auth-box { background: var(--card-bg); padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid #2a2a4a; }
    .auth-box h1 { color: var(--primary); margin-bottom: 10px; font-size: 1.8rem; }
    .auth-box p { color: var(--text-muted); margin-bottom: 30px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.9rem; }
    .form-group input, .form-group textarea { width: 100%; padding: 12px 16px; background: var(--bg); border: 1px solid #333; border-radius: 8px; color: var(--text); font-size: 1rem; }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: var(--primary); color: var(--bg); }
    .btn-primary:hover { background: #00ff88; }
    .btn-secondary { background: #333; color: white; }
    .btn-danger { background: #ff4444; color: white; }
    .btn-link { background: none; color: var(--primary); margin-top: 15px; }
    .btn-small { padding: 8px 16px; font-size: 0.9rem; width: auto; }
    .btn-link:hover { text-decoration: underline; }

    /* Main App */
    .app { display: none; }
    .app.active { display: block; }

    /* Header */
    header { background: var(--secondary); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); }
    .logo { font-size: 1.4rem; font-weight: bold; color: var(--primary); }
    .user-menu { display: flex; align-items: center; gap: 15px; }
    .points { background: #2a2a4a; padding: 6px 12px; border-radius: 20px; font-size: 0.9rem; color: var(--primary); }
    .badges { display: flex; gap: 5px; }
    .badge { font-size: 1.2rem; }

    /* Navigation */
    nav { background: var(--card-bg); padding: 0 25px; display: flex; gap: 5px; border-bottom: 1px solid #2a2a4a; }
    nav button { background: none; border: none; color: var(--text-muted); padding: 15px 20px; cursor: pointer; font-size: 0.95rem; border-bottom: 2px solid transparent; }
    nav button.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* Content */
    .content { padding: 25px; }

    /* Grid */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }

    /* Cards */
    .card { background: var(--card-bg); border-radius: 12px; padding: 20px; border: 1px solid #2a2a4a; }
    .card:hover { border-color: var(--primary); }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .card-title { font-size: 1.1rem; font-weight: 600; }
    .card-badge { font-size: 0.75rem; padding: 4px 10px; border-radius: 12px; text-transform: uppercase; }
    .badge-easy { background: #a6e3a1; color: #1a1a2e; }
    .badge-medium { background: #f9e2af; color: #1a1a2e; }
    .badge-hard { background: #f38ba8; color: #1a1a2e; }
    .card-description { color: var(--text-muted); font-size: 0.9rem; margin: 10px 0; line-height: 1.5; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid #2a2a4a; }
    .card-points { color: var(--primary); font-weight: 600; }
    .hint-text { background: #252535; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 0.85rem; color: #f9e2af; display: none; }
    .hint-text.show { display: block; }

    /* Terminal */
    .terminal-view { display: none; flex-direction: column; height: calc(100vh - 180px); }
    .terminal-view.active { display: flex; }
    #terminal-container { flex: 1; background: #1e1e2e; border-radius: 8px; overflow: hidden; }
    .terminal-controls { display: flex; gap: 10px; margin-top: 15px; }
    .terminal-controls button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }

    /* Leaderboard */
    .leaderboard table { width: 100%; border-collapse: collapse; }
    .leaderboard th, .leaderboard td { padding: 15px 20px; text-align: left; }
    .leaderboard th { background: var(--secondary); color: var(--primary); }
    .leaderboard tr:nth-child(even) { background: #1f1f35; }
    .rank-1 { color: #ffd700; font-weight: bold; }
    .rank-2 { color: #c0c0c0; font-weight: bold; }
    .rank-3 { color: #cd7f32; font-weight: bold; }

    /* Profile */
    .profile-header { display: flex; gap: 30px; align-items: center; margin-bottom: 30px; }
    .profile-avatar { width: 100px; height: 100px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 3rem; color: var(--bg); }
    .profile-info h2 { font-size: 1.8rem; margin-bottom: 5px; }
    .profile-info p { color: var(--text-muted); }
    .profile-stats { display: flex; gap: 30px; margin: 20px 0; }
    .stat { text-align: center; }
    .stat-value { font-size: 2rem; font-weight: bold; color: var(--primary); }
    .stat-label { color: var(--text-muted); font-size: 0.9rem; }

    /* Achievements */
    .achievements-grid { display: flex; flex-wrap: wrap; gap: 15px; }
    .achievement { background: var(--card-bg); padding: 15px 20px; border-radius: 12px; text-align: center; border: 1px solid #2a2a4a; }
    .achievement.locked { opacity: 0.4; }
    .achievement-icon { font-size: 2rem; margin-bottom: 5px; }
    .achievement-name { font-weight: 600; font-size: 0.9rem; }
    .achievement-desc { font-size: 0.8rem; color: var(--text-muted); margin-top: 5px; }
    .achievement.bronze { border-color: #cd7f32; }
    .achievement.silver { border-color: #c0c0c0; }
    .achievement.gold { border-color: #ffd700; }

    /* Admin */
    .admin-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
    .admin-stat { background: var(--card-bg); padding: 20px; border-radius: 12px; text-align: center; }
    .admin-stat-value { font-size: 2rem; font-weight: bold; color: var(--primary); }
    .admin-stat-label { color: var(--text-muted); margin-top: 5px; }
    .admin-table { background: var(--card-bg); border-radius: 12px; overflow: hidden; }
    .admin-table table { width: 100%; }
    .admin-table th, .admin-table td { padding: 12px 15px; text-align: left; }
    .admin-table th { background: var(--secondary); }
    .admin-table tr:nth-child(even) { background: #1f1f35; }

    /* Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 1000; }
    .modal.active { display: flex; }
    .modal-content { background: var(--card-bg); padding: 30px; border-radius: 12px; width: 90%; max-width: 500px; }
    .modal h2 { margin-bottom: 20px; color: var(--primary); }
    .modal-buttons { display: flex; gap: 10px; margin-top: 15px; }
    .modal-buttons button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }

    /* Loading */
    .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; }
    .loading.hidden { display: none; }
    .loading-text { color: var(--primary); font-size: 1.2rem; }
  </style>
</head>
<body>
  <div class="loading" id="loading"><div class="loading-text">Loading...</div></div>

  <!-- Login -->
  <div class="auth-screen" id="login-screen">
    <div class="auth-box">
      <h1>🎯 Blue Team Lab</h1>
      <p>Sign in to access labs and terminal</p>
      <div class="form-group"><label>Username</label><input type="text" id="login-username"></div>
      <div class="form-group"><label>Password</label><input type="password" id="login-password"></div>
      <button class="btn btn-primary" onclick="login()">Sign In</button>
      <button class="btn btn-link" onclick="showRegister()">Create an account</button>
    </div>
  </div>

  <!-- Register -->
  <div class="auth-screen" id="register-screen" style="display:none;">
    <div class="auth-box">
      <h1>🎯 Blue Team Lab</h1>
      <p>Create your account</p>
      <div class="form-group"><label>Username</label><input type="text" id="reg-username"></div>
      <div class="form-group"><label>Email</label><input type="email" id="reg-email"></div>
      <div class="form-group"><label>Password</label><input type="password" id="reg-password"></div>
      <button class="btn btn-primary" onclick="register()">Create Account</button>
      <button class="btn btn-link" onclick="showLogin()">Already have an account?</button>
    </div>
  </div>

  <!-- Main App -->
  <div class="app" id="app">
    <header>
      <div class="logo">🎯 Blue Team Lab Platform</div>
      <div class="user-menu">
        <div class="badges" id="user-badges"></div>
        <div class="points" id="user-points">0 pts</div>
        <button class="btn btn-small btn-secondary" onclick="showProfile()">Profile</button>
        <button class="btn btn-small btn-danger" onclick="logout()">Logout</button>
      </div>
    </header>

    <nav>
      <button class="active" onclick="showTab('labs')">Labs</button>
      <button onclick="showTab('terminal')">Terminal</button>
      <button onclick="showTab('leaderboard')">Leaderboard</button>
      <button onclick="showTab('achievements')">Achievements</button>
      <button onclick="showTab('admin')" id="admin-nav" style="display:none;">Admin</button>
    </nav>

    <!-- Labs -->
    <div class="content" id="labs-tab">
      <div class="grid" id="labs-grid"></div>
    </div>

    <!-- Terminal -->
    <div class="content terminal-view" id="terminal-tab">
      <div id="terminal-container"></div>
      <div class="terminal-controls">
        <button class="btn-secondary" onclick="clearTerminal()">Clear</button>
        <button class="btn-danger" onclick="closeTerminal()">Close</button>
      </div>
    </div>

    <!-- Leaderboard -->
    <div class="content" id="leaderboard-tab">
      <div class="leaderboard">
        <table><thead><tr><th>#</th><th>User</th><th>Points</th><th>Labs</th></tr></thead><tbody id="leaderboard-body"></tbody></table>
      </div>
    </div>

    <!-- Achievements -->
    <div class="content" id="achievements-tab">
      <div class="achievements-grid" id="achievements-grid"></div>
    </div>

    <!-- Admin -->
    <div class="content" id="admin-tab">
      <div class="admin-stats" id="admin-stats"></div>
      <h3 style="margin: 20px 0;">All Labs</h3>
      <div class="admin-table" id="admin-labs"></div>
    </div>
  </div>

  <!-- Profile Modal -->
  <div class="modal" id="profile-modal">
    <div class="modal-content">
      <h2>Edit Profile</h2>
      <div class="form-group">
        <label>Bio</label>
        <textarea id="profile-bio" rows="3" placeholder="Tell us about yourself..."></textarea>
      </div>
      <div class="form-group">
        <label>Avatar (emoji)</label>
        <input type="text" id="profile-avatar" placeholder="🎯">
      </div>
      <div class="modal-buttons">
        <button class="btn-secondary" onclick="closeModal('profile-modal')">Cancel</button>
        <button class="btn-primary" onclick="saveProfile()">Save</button>
      </div>
    </div>
  </div>

  <!-- Flag Modal -->
  <div class="modal" id="flag-modal">
    <div class="modal-content">
      <h2>Submit Flag</h2>
      <p id="flag-lab-name" style="color: var(--text-muted); margin-bottom: 15px;"></p>
      <input type="text" id="flag-input" placeholder="BLUE{flag_here}">
      <div class="modal-buttons">
        <button class="btn-secondary" onclick="closeModal('flag-modal')">Cancel</button>
        <button class="btn-primary" onclick="submitFlag()">Submit</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const API_URL = 'http://localhost:3001';
    const socket = io(API_URL);
    let token = localStorage.getItem('token');
    let user = JSON.parse(localStorage.getItem('user') || 'null');
    let terminal = null, ws = null, currentLabId = null;

    if (token && user) showApp(); else document.getElementById('loading').classList.add('hidden');

    // Auth
    async function login() {
      const res = await fetch(`${API_URL}/api/auth/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: document.getElementById('login-username').value, password: document.getElementById('login-password').value }) });
      const data = await res.json();
      if (res.ok) { token = data.token; user = data.user; localStorage.setItem('token', token); localStorage.setItem('user', JSON.stringify(user)); showApp(); } else alert(data.error);
    }
    async function register() {
      const res = await fetch(`${API_URL}/api/auth/register`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: document.getElementById('reg-username').value, email: document.getElementById('reg-email').value, password: document.getElementById('reg-password').value }) });
      const data = await res.json();
      if (res.ok) { token = data.token; user = data.user; localStorage.setItem('token', token); localStorage.setItem('user', JSON.stringify(user)); showApp(); } else alert(data.error);
    }
    function showLogin() { document.getElementById('login-screen').style.display = 'flex'; document.getElementById('register-screen').style.display = 'none'; }
    function showRegister() { document.getElementById('login-screen').style.display = 'none'; document.getElementById('register-screen').style.display = 'flex'; }
    function logout() { localStorage.removeItem('token'); localStorage.removeItem('user'); location.reload(); }

    function showApp() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('register-screen').style.display = 'none';
      document.getElementById('app').classList.add('active');
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('user-points').textContent = user.points + ' pts';
      if (user.role === 'admin') document.getElementById('admin-nav').style.display = 'block';
      loadLabs(); loadLeaderboard(); loadAchievements(); if (user.role === 'admin') loadAdmin();
    }

    function showTab(tab) {
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      ['labs', 'terminal', 'leaderboard', 'achievements', 'admin'].forEach(t => {
        document.getElementById(t + '-tab').style.display = 'none';
        document.getElementById(t + '-tab').classList.remove('active');
      });
      if (tab === 'terminal') document.getElementById('terminal-tab').classList.add('active');
      else document.getElementById(tab + '-tab').style.display = 'block';
    }

    // Labs
    async function loadLabs() {
      const res = await fetch(`${API_URL}/api/labs`);
      const labs = await res.json();
      const progressRes = await fetch(`${API_URL}/api/labs/progress`, { headers: { 'Authorization': `Bearer ${token}` } });
      const progress = await progressRes.json();
      const completedLabs = progress.filter(p => p.completed).map(p => p.lab_id);

      document.getElementById('labs-grid').innerHTML = labs.map(lab => `
        <div class="card">
          <div class="card-header">
            <span class="card-title">${lab.name}</span>
            <span class="card-badge badge-${lab.difficulty}">${lab.difficulty}</span>
          </div>
          <p class="card-description">${lab.description}</p>
          <div class="hint-text" id="hint-${lab.id}">💡 Hint: ${lab.hint || 'No hint'}</div>
          <div class="card-footer">
            <span class="card-points">${lab.points} pts</span>
            <div>
              <button class="btn btn-small btn-secondary" onclick="toggleHint(${lab.id})">Hint</button>
              <button class="btn btn-small btn-primary" onclick="openFlagModal(${lab.id}, '${lab.name}')" ${completedLabs.includes(lab.id) ? 'disabled' : ''}>${completedLabs.includes(lab.id) ? '✓ Done' : 'Submit'}</button>
            </div>
          </div>
        </div>
      `).join('');
    }
    function toggleHint(id) { const el = document.getElementById('hint-' + id); el.classList.toggle('show'); }

    // Leaderboard
    async function loadLeaderboard() {
      const res = await fetch(`${API_URL}/api/users/leaderboard`);
      const users = await res.json();
      document.getElementById('leaderboard-body').innerHTML = users.map((u, i) => `<tr><td class="rank-${i + 1}">${i + 1}</td><td>${u.avatar || '👤'} ${u.username}</td><td>${u.points}</td><td>${u.labs_completed || 0}</td></tr>`).join('');
    }

    // Achievements
    async function loadAchievements() {
      const res = await fetch(`${API_URL}/api/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } });
      const data = await res.json();
      const earned = data.achievements?.map(a => a.id) || [];

      const allRes = await fetch(`${API_URL}/api/labs`); // reuse for now
      document.getElementById('achievements-grid').innerHTML = [
        { name: 'First Blood', desc: 'Complete 1 lab', icon: '🎯', type: 'bronze' },
        { name: 'Blue Analyst', desc: 'Earn 50 pts', icon: '🔵', type: 'bronze' },
        { name: 'SOC Specialist', desc: 'Earn 100 pts', icon: '🛡️', type: 'silver' },
        { name: 'Threat Hunter', desc: 'Earn 250 pts', icon: '🎯', type: 'silver' },
        { name: 'Detection Engineer', desc: 'Earn 500 pts', icon: '🔍', type: 'gold' },
        { name: 'Lab Hunter', desc: 'Complete 5 labs', icon: '🏆', type: 'bronze' },
        { name: 'Lab Master', desc: 'Complete 10 labs', icon: '👑', type: 'silver' },
        { name: 'Blue Legend', desc: 'Complete 20 labs', icon: '⭐', type: 'gold' }
      ].map(a => `<div class="achievement ${a.type}"><div class="achievement-icon">${a.icon}</div><div class="achievement-name">${a.name}</div><div class="achievement-desc">${a.desc}</div></div>`).join('');
    }

    // Admin
    async function loadAdmin() {
      const res = await fetch(`${API_URL}/api/admin/stats`, { headers: { 'Authorization': `Bearer ${token}` } });
      const stats = await res.json();
      document.getElementById('admin-stats').innerHTML = `
        <div class="admin-stat"><div class="admin-stat-value">${stats.users}</div><div class="admin-stat-label">Users</div></div>
        <div class="admin-stat"><div class="admin-stat-value">${stats.labs}</div><div class="admin-stat-label">Labs</div></div>
        <div class="admin-stat"><div class="admin-stat-value">${stats.completions}</div><div class="admin-stat-label">Completions</div></div>
        <div class="admin-stat"><div class="admin-stat-value">${stats.active_terminals}</div><div class="admin-stat-label">Active Terminals</div></div>
      `;

      const labsRes = await fetch(`${API_URL}/api/admin/labs`, { headers: { 'Authorization': `Bearer ${token}` } });
      const labs = await labsRes.json();
      document.getElementById('admin-labs').innerHTML = `<table><thead><tr><th>ID</th><th>Name</th><th>Difficulty</th><th>Points</th><th>Actions</th></tr></thead><tbody>${labs.map(l => `<tr><td>${l.id}</td><td>${l.name}</td><td>${l.difficulty}</td><td>${l.points}</td><td><button class="btn btn-small btn-danger" onclick="deleteLab(${l.id})">Delete</button></td></tr>`).join('')}</tbody></table>`;
    }
    async function deleteLab(id) {
      if (confirm('Delete this lab?')) {
        await fetch(`${API_URL}/api/admin/labs/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
        loadAdmin(); loadLabs();
      }
    }

    // Terminal
    function initTerminal(labId) {
      if (terminal) terminal.dispose();
      terminal = new Terminal({ cursorBlink: true, fontSize: 14, fontFamily: '"Cascadia Code", monospace', theme: { background: '#1e1e2e', foreground: '#cdd6f4' } });
      const fitAddon = new FitAddon();
      terminal.loadAddon(fitAddon);
      terminal.open(document.getElementById('terminal-container'));
      fitAddon.fit();

      fetch(`${API_URL}/api/terminals`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ labId, cols: terminal.cols, rows: terminal.rows }) })
        .then(r => r.json())
        .then(data => {
          currentLabId = labId;
          ws = new WebSocket(`${API_URL.replace('http', 'ws')}?token=${token}&id=${data.id}`);
          ws.onmessage = e => terminal.write(e.data);
          terminal.onData = d => ws && ws.send(d);
        })
        .catch(e => terminal.writeln('\x1b[31mFailed to connect. Is server running?\x1b[0m'));
    }
    function clearTerminal() { terminal?.clear(); }
    function closeTerminal() { if (ws) ws.close(); currentLabId = null; }

    // Modals
    function openFlagModal(labId, labName) { currentLabId = labId; document.getElementById('flag-lab-name').textContent = labName; document.getElementById('flag-modal').classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    async function submitFlag() {
      const res = await fetch(`${API_URL}/api/labs/${currentLabId}/flag`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ flag: document.getElementById('flag-input').value }) });
      const data = await res.json();
      alert(data.message);
      if (data.points > 0) { closeModal('flag-modal'); loadLabs(); loadLeaderboard(); }
    }
    function showProfile() { document.getElementById('profile-modal').classList.add('active'); }
    async function saveProfile() {
      await fetch(`${API_URL}/api/auth/profile`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ bio: document.getElementById('profile-bio').value, avatar: document.getElementById('profile-avatar').value }) });
      closeModal('profile-modal');
    }

    // Real-time events
    socket.on('lab_completed', data => { if (data.user_id === user.id) loadLeaderboard(); });
    socket.on('achievements_earned', data => { if (data.user_id === user.id) loadAchievements(); });
  </script>
</body>
</html>
