<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue Team Lab - Terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #00d4aa;
      --secondary: #1a1a2e;
      --bg: #0a0a12;
      --terminal-bg: #1e1e2e;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background: var(--secondary);
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--primary);
    }

    .logo {
      font-size: 1.4rem;
      font-weight: bold;
      color: var(--primary);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff4444;
      animation: pulse 2s infinite;
    }

    .status-dot.connected {
      background: #00ff88;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Terminal Container */
    #terminal-container {
      flex: 1;
      padding: 15px;
      background: var(--terminal-bg);
      overflow: hidden;
    }

    .xterm {
      height: 100%;
      padding: 10px;
    }

    .xterm-viewport {
      overflow-y: auto !important;
    }

    /* Control Bar */
    .controls {
      background: var(--secondary);
      padding: 12px 25px;
      display: flex;
      gap: 12px;
      border-top: 1px solid #333;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: var(--primary);
      color: var(--bg);
    }

    .btn-primary:hover {
      background: #00ff88;
      transform: translateY(-2px);
    }

    .btn-danger {
      background: #ff4444;
      color: white;
    }

    .btn-danger:hover {
      background: #ff6666;
    }

    .btn-secondary {
      background: #333;
      color: white;
    }

    .btn-secondary:hover {
      background: #444;
    }

    /* Info Panel */
    .info-panel {
      background: #252535;
      padding: 15px 25px;
      font-size: 0.85rem;
      color: #888;
      display: flex;
      justify-content: space-between;
    }

    .info-panel span {
      color: var(--primary);
    }

    /* Terminal Selection */
    .terminal-select {
      background: #333;
      color: white;
      padding: 8px 12px;
      border: none;
      border-radius: 4px;
      font-size: 0.9rem;
    }

    /* Loading */
    .loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .loading.hidden {
      display: none;
    }

    .loading-text {
      font-size: 1.2rem;
      color: var(--primary);
      animation: pulse 1.5s infinite;
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="loading-text">Connecting to terminal...</div>
  </div>

  <header>
    <div class="logo">🎯 Blue Team Lab Terminal</div>
    <div class="status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Disconnected</span>
    </div>
  </header>

  <div id="terminal-container"></div>

  <div class="info-panel">
    <div>Shell: <span id="shell-type">bash</span></div>
    <div>Session: <span id="session-id">-</span></div>
    <div>
      <select id="shell-select" class="terminal-select">
        <option value="bash">Bash</option>
        <option value="powershell">PowerShell</option>
        <option value="zsh">Zsh</option>
      </select>
      <button class="btn btn-primary" id="new-terminal-btn">New Terminal</button>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-secondary" id="clear-btn">Clear</button>
    <button class="btn btn-secondary" id="reset-btn">Reset</button>
    <button class="btn btn-danger" id="close-btn">Close Session</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-search@0.13.0/lib/xterm-addon-search.min.js"></script>

  <script>
    const API_URL = 'http://localhost:3001';
    const WS_URL = 'ws://localhost:8080';

    let terminal = null;
    let fitAddon = null;
    let ws = null;
    let currentTermId = null;

    // Initialize terminal
    function initTerminal() {
      terminal = new Terminal({
        cursorBlink: true,
        fontSize: 14,
        fontFamily: '"Cascadia Code", "Fira Code", monospace',
        theme: {
          background: '#1e1e2e',
          foreground: '#cdd6f4',
          cursor: '#f5e0dc',
          selectionBackground: '#45475a',
          black: '#45475a',
          red: '#f38ba8',
          green: '#a6e3a1',
          yellow: '#f9e2af',
          blue: '#89b4fa',
          magenta: '#f5c2e7',
          cyan: '#94e2d5',
          white: '#bac2de',
          brightBlack: '#585b70',
          brightRed: '#f38ba8',
          brightGreen: '#a6e3a1',
          brightYellow: '#f9e2af',
          brightBlue: '#89b4fa',
          brightMagenta: '#f5c2e7',
          brightCyan: '#94e2d5',
          brightWhite: '#a6adc8'
        }
      });

      fitAddon = new FitAddon();
      terminal.loadAddon(fitAddon);

      const webLinksAddon = new WebLinksAddon();
      terminal.loadAddon(webLinksAddon);

      const searchAddon = new SearchAddon();
      terminal.loadAddon(searchAddon);

      terminal.open(document.getElementById('terminal-container'));
      fitAddon.fit();

      // Handle resize
      window.addEventListener('resize', () => {
        fitAddon.fit();
        if (ws && ws.readyState === WebSocket.OPEN) {
          // Send resize to server if needed
        }
      });
    }

    // Create new terminal
    async function createTerminal() {
      const shell = document.getElementById('shell-select').value;

      try {
        const response = await fetch(`${API_URL}/api/terminals`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user: 'user-' + Math.floor(Math.random() * 1000),
            shell: shell,
            cols: terminal ? terminal.cols : 80,
            rows: terminal ? terminal.rows : 30
          })
        });

        const data = await response.json();

        if (data.id) {
          currentTermId = data.id;
          document.getElementById('session-id').textContent = data.id.substring(0, 8);
          document.getElementById('shell-type').textContent = data.shell;
          connectWebSocket(data.id);
        }
      } catch (error) {
        console.error('Failed to create terminal:', error);
        terminal.writeln('\x1b[31mFailed to create terminal. Is the server running?\x1b[0m');
      }
    }

    // Connect to WebSocket
    function connectWebSocket(termId) {
      if (ws) {
        ws.close();
      }

      ws = new WebSocket(`${WS_URL}?id=${termId}`);

      ws.onopen = () => {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('status-dot').classList.add('connected');
        document.getElementById('status-text').textContent = 'Connected';
        console.log('[+] WebSocket connected');
      };

      ws.onmessage = (event) => {
        terminal.write(event.data);
      };

      ws.onclose = () => {
        document.getElementById('status-dot').classList.remove('connected');
        document.getElementById('status-text').textContent = 'Disconnected';
        terminal.writeln('\r\n\x1b[33mSession closed.\x1b[0m');
        console.log('[-] WebSocket disconnected');
      };

      ws.onerror = (error) => {
        console.error('[!] WebSocket error:', error);
        terminal.writeln('\x1b[31mConnection error!\x1b[0m');
      };

      // Send terminal input to server
      terminal.onData((data) => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(data);
        }
      });
    }

    // Delete terminal
    async function deleteTerminal() {
      if (!currentTermId) return;

      try {
        await fetch(`${API_URL}/api/terminals/${currentTermId}`, {
          method: 'DELETE'
        });

        if (ws) {
          ws.close();
        }

        currentTermId = null;
        terminal.clear();
        terminal.writeln('\x1b[32mSession closed and cleaned up.\x1b[0m');
        document.getElementById('session-id').textContent = '-';
      } catch (error) {
        console.error('Failed to delete terminal:', error);
      }
    }

    // Event listeners
    document.getElementById('new-terminal-btn').addEventListener('click', () => {
      createTerminal();
    });

    document.getElementById('clear-btn').addEventListener('click', () => {
      terminal.clear();
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
      terminal.reset();
    });

    document.getElementById('close-btn').addEventListener('click', () => {
      deleteTerminal();
    });

    // Initialize
    initTerminal();
    createTerminal();
  </script>
</body>
</html>
