<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue Team Lab Platform</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #00d4aa; --primary-hover: #00ff88; --secondary: #1a1a2e; --bg: #0a0a12; --card-bg: #16162a; --text: #e0e0e0; --text-muted: #888; --border: #2a2a4a; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Auth */
    .auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; background: radial-gradient(135deg, var(--secondary) 0%, var(--bg) 100%); }
    .auth-box { background: var(--card-bg); padding: 45px; border-radius: 16px; width: 100%; max-width: 420px; border: 1px solid var(--border); box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .auth-box h1 { color: var(--primary); margin-bottom: 8px; font-size: 2rem; text-align: center; }
    .auth-box .subtitle { color: var(--text-muted); text-align: center; margin-bottom: 30px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.9rem; font-weight: 500; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 14px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 1rem; transition: border-color 0.2s; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: var(--primary); }
    .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: linear-gradient(135deg, var(--primary), #00ff88); color: #0a0a12; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,212,170,0.3); }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-danger { background: #ff4757; color: white; }
    .btn-small { padding: 10px 18px; font-size: 0.9rem; width: auto; }
    .btn-link { background: none; color: var(--primary); margin-top: 15px; font-size: 0.95rem; }

    /* Main */
    .app { display: none; }
    .app.active { display: block; }

    /* Header */
    header { background: var(--secondary); padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.5rem; font-weight: bold; color: var(--primary); display: flex; align-items: center; gap: 10px; }
    .logo span { background: var(--primary); color: var(--bg); padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; }
    .user-menu { display: flex; align-items: center; gap: 15px; }
    .points-badge { background: linear-gradient(135deg, var(--primary), #00ff88); color: var(--bg); padding: 8px 16px; border-radius: 20px; font-weight: 700; }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: var(--bg); font-weight: bold; }

    /* Nav */
    nav { background: var(--card-bg); padding: 0 25px; display: flex; gap: 5px; border-bottom: 1px solid var(--border); overflow-x: auto; }
    nav button { background: none; border: none; color: var(--text-muted); padding: 16px 22px; cursor: pointer; font-size: 0.95rem; font-weight: 500; border-bottom: 3px solid transparent; white-space: nowrap; transition: all 0.2s; }
    nav button:hover { color: var(--text); }
    nav button.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* Content */
    .content { padding: 25px; }
    .content h2 { margin-bottom: 20px; font-size: 1.5rem; }

    /* Grid */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }

    /* Cards */
    .card { background: var(--card-bg); border-radius: 14px; padding: 22px; border: 1px solid var(--border); transition: all 0.3s; }
    .card:hover { border-color: var(--primary); transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.3); }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .card-title { font-size: 1.15rem; font-weight: 600; }
    .card-badge { font-size: 0.7rem; padding: 5px 12px; border-radius: 15px; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
    .badge-easy { background: #2ed573; color: #0a0a12; }
    .badge-medium { background: #ffa502; color: #0a0a12; }
    .badge-hard { background: #ff4757; color: white; }
    .card-description { color: var(--text-muted); font-size: 0.9rem; margin: 12px 0; line-height: 1.6; min-height: 45px; }
    .card-tags { display: flex; gap: 8px; margin: 12px 0; flex-wrap: wrap; }
    .card-tag { background: var(--border); padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; color: var(--text-muted); }
    .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 18px; padding-top: 18px; border-top: 1px solid var(--border); }
    .card-points { color: var(--primary); font-weight: 700; font-size: 1.1rem; }
    .card-actions { display: flex; gap: 10px; }

    /* Terminal */
    .terminal-view { display: none; flex-direction: column; height: calc(100vh - 130px); }
    .terminal-view.active { display: flex; }
    #terminal-container { flex: 1; background: #0d0d14; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
    .terminal-controls { display: flex; gap: 12px; margin-top: 15px; }
    .terminal-controls button { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }

    /* Leaderboard */
    .leaderboard { background: var(--card-bg); border-radius: 14px; overflow: hidden; }
    .leaderboard table { width: 100%; }
    .leaderboard th, .leaderboard td { padding: 18px 22px; text-align: left; }
    .leaderboard th { background: var(--secondary); color: var(--primary); font-weight: 600; }
    .leaderboard tr:nth-child(even) { background: rgba(255,255,255,0.02); }
    .leaderboard tr:hover { background: rgba(0,212,170,0.05); }
    .rank-1 { color: #ffd700; font-weight: bold; font-size: 1.1rem; }
    .rank-2 { color: #c0c0c0; font-weight: bold; }
    .rank-3 { color: #cd7f32; font-weight: bold; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: var(--card-bg); padding: 25px; border-radius: 14px; text-align: center; border: 1px solid var(--border); }
    .stat-value { font-size: 2.5rem; font-weight: bold; background: linear-gradient(135deg, var(--primary), #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .stat-label { color: var(--text-muted); margin-top: 8px; font-size: 0.9rem; }

    /* Teams */
    .team-card { background: var(--card-bg); padding: 20px; border-radius: 14px; margin-bottom: 15px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .team-info h3 { margin-bottom: 5px; }
    .team-info p { color: var(--text-muted); font-size: 0.9rem; }
    .team-points { color: var(--primary); font-weight: bold; font-size: 1.3rem; }
    .team-members { color: var(--text-muted); font-size: 0.85rem; margin-top: 5px; }

    /* Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(5px); }
    .modal.active { display: flex; }
    .modal-content { background: var(--card-bg); padding: 35px; border-radius: 16px; width: 90%; max-width: 500px; border: 1px solid var(--border); }
    .modal h2 { margin-bottom: 20px; color: var(--primary); }
    .modal-buttons { display: flex; gap: 12px; margin-top: 20px; }
    .modal-buttons button { flex: 1; padding: 14px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }

    /* Loading */
    .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; flex-direction: column; gap: 20px; }
    .loading.hidden { display: none; }
    .spinner { width: 50px; height: 50px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Tabs */
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab-btn { padding: 10px 20px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text-muted); cursor: pointer; }
    .tab-btn.active { background: var(--primary); color: var(--bg); border-color: var(--primary); }

    .hint-box { background: rgba(255,165,2,0.1); border: 1px solid rgba(255,165,2,0.3); padding: 12px; border-radius: 8px; margin-top: 12px; font-size: 0.9rem; color: #ffa502; display: none; }
    .hint-box.show { display: block; }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div style="color: var(--primary);">Loading Blue Team Lab...</div>
  </div>

  <!-- Auth -->
  <div class="auth-screen" id="login-screen">
    <div class="auth-box">
      <h1>🎯 Blue Team Lab</h1>
      <p class="subtitle">Practice Blue Team Skills</p>
      <div class="form-group"><label>Username</label><input type="text" id="login-username" placeholder="Enter username"></div>
      <div class="form-group"><label>Password</label><input type="password" id="login-password" placeholder="Enter password"></div>
      <button class="btn btn-primary" onclick="login()">Sign In</button>
      <button class="btn btn-link" onclick="showRegister()">Create an account</button>
    </div>
  </div>

  <div class="auth-screen" id="register-screen" style="display:none;">
    <div class="auth-box">
      <h1>🎯 Blue Team Lab</h1>
      <p class="subtitle">Start your journey</p>
      <div class="form-group"><label>Username</label><input type="text" id="reg-username"></div>
      <div class="form-group"><label>Email</label><input type="email" id="reg-email"></div>
      <div class="form-group"><label>Password</label><input type="password" id="reg-password"></div>
      <button class="btn btn-primary" onclick="register()">Create Account</button>
      <button class="btn btn-link" onclick="showLogin()">Already have an account?</button>
    </div>
  </div>

  <!-- Main -->
  <div class="app" id="app">
    <header>
      <div class="logo">🎯 Blue Team Lab <span>PRO</span></div>
      <div class="user-menu">
        <div class="user-info">
          <div class="user-avatar" id="header-avatar">👤</div>
          <div>
            <div style="font-weight: 600;" id="header-username">User</div>
            <div style="font-size: 0.8rem; color: var(--text-muted);" id="header-team">No team</div>
          </div>
        </div>
        <div class="points-badge" id="user-points">0 pts</div>
        <button class="btn btn-small btn-secondary" onclick="showProfileModal()">Edit Profile</button>
        <button class="btn btn-small btn-danger" onclick="logout()">Logout</button>
      </div>
    </header>

    <nav>
      <button class="active" onclick="showTab('labs')">🧪 Labs</button>
      <button onclick="showTab('terminal')">💻 Terminal</button>
      <button onclick="showTab('leaderboard')">🏆 Leaderboard</button>
      <button onclick="showTab('teams')">👥 Teams</button>
      <button onclick="showTab('achievements')">🏅 Achievements</button>
      <button onclick="showTab('admin')" id="admin-nav" style="display:none;">⚙️ Admin</button>
    </nav>

    <div class="content" id="labs-tab">
      <div class="tabs">
        <button class="tab-btn active" onclick="filterLabs('all')">All</button>
        <button class="tab-btn" onclick="filterLabs('easy')">Easy</button>
        <button class="tab-btn" onclick="filterLabs('medium')">Medium</button>
        <button class="tab-btn" onclick="filterLabs('hard')">Hard</button>
      </div>
      <div class="grid" id="labs-grid"></div>
    </div>

    <div class="content terminal-view" id="terminal-tab">
      <div id="terminal-container"></div>
      <div class="terminal-controls">
        <button class="btn btn-secondary" onclick="clearTerminal()">Clear</button>
        <button class="btn btn-danger" onclick="closeTerminal()">Close Session</button>
      </div>
    </div>

    <div class="content" id="leaderboard-tab">
      <h2>Top Players</h2>
      <div class="leaderboard"><table><thead><tr><th>#</th><th>User</th><th>Team</th><th>Points</th><th>Labs</th></tr></thead><tbody id="leaderboard-body"></tbody></table></div>
    </div>

    <div class="content" id="teams-tab">
      <h2>Teams</h2>
      <button class="btn btn-primary" style="width: auto; margin-bottom: 20px;" onclick="showCreateTeamModal()">+ Create Team</button>
      <div id="teams-grid"></div>
    </div>

    <div class="content" id="achievements-tab">
      <h2>Your Achievements</h2>
      <div class="grid" id="achievements-grid"></div>
    </div>

    <div class="content" id="admin-tab">
      <div class="stats-grid" id="admin-stats"></div>
      <h3>Manage Labs</h3>
      <button class="btn btn-primary" style="width: auto; margin: 15px 0;" onclick="showCreateLabModal()">+ Add Lab</button>
      <div class="leaderboard"><table><thead><tr><th>ID</th><th>Name</th><th>Difficulty</th><th>Points</th><th>Actions</th></tr></thead><tbody id="admin-labs"></tbody></table></div>
    </div>
  </div>

  <!-- Modals -->
  <div class="modal" id="flag-modal">
    <div class="modal-content">
      <h2>Submit Flag</h2>
      <p id="flag-lab-name" style="color: var(--text-muted); margin-bottom: 15px;"></p>
      <div class="form-group"><input type="text" id="flag-input" placeholder="BLUE{flag_here}"></div>
      <div class="modal-buttons"><button class="btn btn-secondary" onclick="closeModal('flag-modal')">Cancel</button><button class="btn btn-primary" onclick="submitFlag()">Submit</button></div>
    </div>
  </div>

  <div class="modal" id="profile-modal">
    <div class="modal-content">
      <h2>Edit Profile</h2>
      <div class="form-group"><label>Avatar (emoji)</label><input type="text" id="profile-avatar" placeholder="🎯"></div>
      <div class="form-group"><label>Bio</label><textarea id="profile-bio" rows="3"></textarea></div>
      <div class="modal-buttons"><button class="btn btn-secondary" onclick="closeModal('profile-modal')">Cancel</button><button class="btn btn-primary" onclick="saveProfile()">Save</button></div>
    </div>
  </div>

  <div class="modal" id="team-modal">
    <div class="modal-content">
      <h2>Create Team</h2>
      <div class="form-group"><label>Team Name</label><input type="text" id="team-name"></div>
      <div class="form-group"><label>Description</label><textarea id="team-desc" rows="3"></textarea></div>
      <div class="modal-buttons"><button class="btn btn-secondary" onclick="closeModal('team-modal')">Cancel</button><button class="btn btn-primary" onclick="createTeam()">Create</button></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const API = 'http://localhost:3001';
    const socket = io(API);
    let token = localStorage.getItem('token');
    let user = JSON.parse(localStorage.getItem('user') || 'null');
    let terminal = null, ws = null, currentLabId = null, allLabs = [];

    if (token && user) showApp(); else document.getElementById('loading').classList.add('hidden');

    // Auth
    async function login() {
      const res = await fetch(`${API}/api/auth/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: document.getElementById('login-username').value, password: document.getElementById('login-password').value }) });
      const d = await res.json();
      if (res.ok) { token = d.token; user = d.user; localStorage.setItem('token', token); localStorage.setItem('user', JSON.stringify(user)); showApp(); } else alert(d.error);
    }
    async function register() {
      const res = await fetch(`${API}/api/auth/register`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: document.getElementById('reg-username').value, email: document.getElementById('reg-email').value, password: document.getElementById('reg-password').value }) });
      const d = await res.ok ? await res.json() : null;
      if (d) { token = d.token; user = d.user; localStorage.setItem('token', token); localStorage.setItem('user', JSON.stringify(user)); showApp(); }
    }
    function showLogin() { document.getElementById('login-screen').style.display = 'flex'; document.getElementById('register-screen').style.display = 'none'; }
    function showRegister() { document.getElementById('login-screen').style.display = 'none'; document.getElementById('register-screen').style.display = 'flex'; }
    function logout() { localStorage.removeItem('token'); localStorage.removeItem('user'); location.reload(); }

    function showApp() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('register-screen').style.display = 'none';
      document.getElementById('app').classList.add('active');
      document.getElementById('loading').classList.add('hidden');

      document.getElementById('header-avatar').textContent = user.avatar || '👤';
      document.getElementById('header-username').textContent = user.username;
      document.getElementById('user-points').textContent = user.points + ' pts';
      if (user.role === 'admin') document.getElementById('admin-nav').style.display = 'block';

      loadLabs(); loadLeaderboard(); loadTeams(); loadAchievements();
      if (user.role === 'admin') loadAdmin();
    }

    function showTab(tab) {
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      event?.target?.classList.add('active');
      ['labs', 'terminal', 'leaderboard', 'teams', 'achievements', 'admin'].forEach(t => {
        document.getElementById(t + '-tab').style.display = 'none';
        document.getElementById(t + '-tab').classList.remove('active');
      });
      if (tab === 'terminal') document.getElementById('terminal-tab').classList.add('active');
      else document.getElementById(tab + '-tab').style.display = 'block';
    }

    // Labs
    async function loadLabs() {
      allLabs = await (await fetch(`${API}/api/labs`)).json();
      renderLabs(allLabs);
    }
    function renderLabs(labs) {
      document.getElementById('labs-grid').innerHTML = labs.map(l => `
        <div class="card">
          <div class="card-header"><span class="card-title">${l.name}</span><span class="card-badge badge-${l.difficulty}">${l.difficulty}</span></div>
          <p class="card-description">${l.description}</p>
          <div class="hint-box" id="hint-${l.id}">💡 ${l.hint || 'No hint'}</div>
          <div class="card-footer"><span class="card-points">${l.points} pts</span><div class="card-actions"><button class="btn btn-small btn-secondary" onclick="toggleHint(${l.id})">Hint</button><button class="btn btn-small btn-primary" onclick="openFlagModal(${l.id}, '${l.name}')">Submit</button></div></div>
        </div>
      `).join('');
    }
    function filterLabs(difficulty) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      renderLabs(difficulty === 'all' ? allLabs : allLabs.filter(l => l.difficulty === difficulty));
    }
    function toggleHint(id) { document.getElementById('hint-' + id).classList.toggle('show'); }

    // Leaderboard
    async function loadLeaderboard() {
      const users = await (await fetch(`${API}/api/users/leaderboard`)).json();
      document.getElementById('leaderboard-body').innerHTML = users.map((u, i) => `<tr><td class="rank-${i + 1}">${i + 1}</td><td>${u.avatar || '👤'} ${u.username}</td><td>${u.team_id ? 'Team ' + u.team_id : '-'}</td><td>${u.points}</td><td>${u.labs_completed || 0}</td></tr>`).join('');
    }

    // Teams
    async function loadTeams() {
      const teams = await (await fetch(`${API}/api/teams`)).json();
      document.getElementById('teams-grid').innerHTML = teams.map(t => `
        <div class="team-card">
          <div class="team-info"><h3>${t.name}</h3><p>${t.description || 'No description'}</p><div class="team-members">👥 ${t.members_count} members | Leader: ${t.leader_name}</div></div>
          <div style="text-align: right;"><div class="team-points">${t.points} pts</div><button class="btn btn-small btn-primary" onclick="joinTeam(${t.id})">Join</button></div>
        </div>
      `).join('');
    }
    async function joinTeam(id) {
      await fetch(`${API}/api/teams/${id}/join`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
      loadTeams();
    }

    // Achievements
    async function loadAchievements() {
      const achievements = [{ name: 'First Blood', desc: '1 lab', icon: '🎯', type: 'bronze' },{ name: 'Blue Analyst', desc: '50 pts', icon: '🔵', type: 'bronze' },{ name: 'SOC Specialist', desc: '100 pts', icon: '🛡️', type: 'silver' },{ name: 'Threat Hunter', desc: '250 pts', icon: '🎯', type: 'silver' },{ name: 'Detection Engineer', desc: '500 pts', icon: '🔍', type: 'gold' },{ name: 'Lab Hunter', desc: '5 labs', icon: '🏆', type: 'bronze' },{ name: 'Lab Master', desc: '10 labs', icon: '👑', type: 'silver' },{ name: 'Blue Legend', desc: '20 labs', icon: '⭐', type: 'gold' }];
      document.getElementById('achievements-grid').innerHTML = achievements.map(a => `<div class="card" style="text-align: center;"><div style="font-size: 3rem;">${a.icon}</div><div style="font-weight: 600; margin-top: 10px;">${a.name}</div><div style="color: var(--text-muted); font-size: 0.85rem;">${a.desc}</div></div>`).join('');
    }

    // Admin
    async function loadAdmin() {
      const stats = await (await fetch(`${API}/api/admin/stats`, { headers: { 'Authorization': `Bearer ${token}` } })).json();
      document.getElementById('admin-stats').innerHTML = `<div class="stat-card"><div class="stat-value">${stats.users}</div><div class="stat-label">Users</div></div><div class="stat-card"><div class="stat-value">${stats.labs}</div><div class="stat-label">Labs</div></div><div class="stat-card"><div class="stat-value">${stats.completions}</div><div class="stat-label">Completions</div></div><div class="stat-card"><div class="stat-value">${stats.teams}</div><div class="stat-label">Teams</div></div>`;
      const labs = await (await fetch(`${API}/api/admin/labs`, { headers: { 'Authorization': `Bearer ${token}` } })).json();
      document.getElementById('admin-labs').innerHTML = labs.map(l => `<tr><td>${l.id}</td><td>${l.name}</td><td>${l.difficulty}</td><td>${l.points}</td><td><button class="btn btn-small btn-danger" onclick="deleteLab(${l.id})">Delete</button></td></tr>`).join('');
    }
    async function deleteLab(id) {
      if (confirm('Delete this lab?')) {
        await fetch(`${API}/api/admin/labs/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
        loadAdmin(); loadLabs();
      }
    }

    // Terminal
    function initTerminal(labId) {
      if (terminal) terminal.dispose();
      terminal = new Terminal({ cursorBlink: true, fontSize: 14, fontFamily: '"Cascadia Code", monospace', theme: { background: '#0d0d14', foreground: '#cdd6f4' } });
      const fitAddon = new FitAddon();
      terminal.loadAddon(fitAddon);
      terminal.open(document.getElementById('terminal-container'));
      fitAddon.fit();
      fetch(`${API}/api/terminals`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ labId, cols: terminal.cols, rows: terminal.rows }) })
        .then(r => r.json()).then(data => { currentLabId = labId; ws = new WebSocket(`${API.replace('http','ws')}?token=${token}&id=${data.id}`); ws.onmessage = e => terminal.write(e.data); terminal.onData = d => ws && ws.send(d); })
        .catch(() => terminal.writeln('\x1b[31mFailed to connect. Is server running?\x1b[0m'));
    }
    function clearTerminal() { terminal?.clear(); }
    function closeTerminal() { if (ws) ws.close(); currentLabId = null; }

    // Modals
    function openFlagModal(id, name) { currentLabId = id; document.getElementById('flag-lab-name').textContent = name; document.getElementById('flag-modal').classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    async function submitFlag() {
      const d = await (await fetch(`${API}/api/labs/${currentLabId}/flag`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ flag: document.getElementById('flag-input').value }) })).json();
      alert(d.message);
      if (d.points > 0) { closeModal('flag-modal'); loadLabs(); loadLeaderboard(); }
    }
    function showProfileModal() { document.getElementById('profile-avatar').value = user.avatar || ''; document.getElementById('profile-bio').value = user.bio || ''; document.getElementById('profile-modal').classList.add('active'); }
    async function saveProfile() { await fetch(`${API}/api/auth/profile`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ avatar: document.getElementById('profile-avatar').value, bio: document.getElementById('profile-bio').value }) }); closeModal('profile-modal'); }
    function showCreateTeamModal() { document.getElementById('team-modal').classList.add('active'); }
    async function createTeam() { await fetch(`${API}/api/teams`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ name: document.getElementById('team-name').value, description: document.getElementById('team-desc').value }) }); closeModal('team-modal'); loadTeams(); }

    // Real-time
    socket.on('lab_completed', d => { loadLeaderboard(); });
  </script>
</body>
</html>
